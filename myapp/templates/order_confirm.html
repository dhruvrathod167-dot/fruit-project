{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        .product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container my-5">
    <div class="card p-4 shadow-sm">

        <h3 class="text-success mb-4">✅ Order Confirmed</h3>
        <p class="text-muted">Thank you for your purchase</p>

        <!-- PRODUCTS -->
        {% for i in cart_items %}
        <div class="d-flex align-items-center mb-3">

            <img src="{{ i.product.img.url }}" class="product-img me-3">

            <div class="flex-grow-1">
                <h6 class="mb-0">{{ i.product.name }}</h6>
                <small class="text-muted">
                    ₹{{ i.product.price }} × {{ i.quantity }}
                </small>
            </div>

            <strong>₹{{ i.total_price }}</strong>
        </div>
        {% endfor %}

        <hr>

        <!-- TOTALS -->
        <div class="d-flex justify-content-between">
            <span>Subtotal</span>
            <strong>₹{{ subtotal }}</strong>
        </div>

        <div class="d-flex justify-content-between">
            <span>Shipping</span>
            <strong>₹{{ shipping }}</strong>
        </div>

        <div class="d-flex justify-content-between mb-3">
            <span>Total</span>
            <strong class="text-success">₹{{ total }}</strong>
        </div>

        <a href="{% url 'index' %}" class="btn btn-success w-100 mt-3">
            Continue Shopping
        </a>

    </div>
</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
